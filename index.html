<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>WMS คลัง 7-8 / 9-10</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root {
  --bg:       #f8fafc;
  --bg2:      #ffffff;
  --bg3:      #f1f5f9;
  --border:   #e2e8f0;
  --border2:  #cbd5e1;
  --text:     #0f172a;
  --text2:    #334155;
  --text3:    #64748b;
  --accent:   #2563eb;
  --accent2:  #1d4ed8;
  --green:    #16a34a;
  --green-bg: #f0fdf4;
  --green-t:  #15803d;
  --red:      #dc2626;
  --red-bg:   #fef2f2;
  --red-t:    #b91c1c;
  --amber:    #d97706;
  --amber-bg: #fffbeb;
  --amber-t:  #92400e;
  --purple:   #7c3aed;
  --radius:   14px;
  --radius-sm:10px;
  --font:     'Sarabun', sans-serif;
  --mono:     'IBM Plex Mono', monospace;
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 18px; }

/* ── SHELL ── */
.shell { display: flex; flex-direction: column; height: 100dvh; }

/* ── HEADER ── */
.header {
  background: var(--bg2);
  border-bottom: 1.5px solid var(--border);
  padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; color: var(--text); }
.header-sub { font-size: 13px; color: var(--text3); font-family: var(--mono); }
.wh-toggle { display: flex; background: var(--bg3); border-radius: 10px; padding: 3px; gap: 3px; border: 1px solid var(--border); }
.wh-btn { padding: 8px 18px; border-radius: 8px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; background: transparent; color: var(--text3); font-family: var(--font); transition: all .2s; }
.wh-btn.active { background: var(--accent); color: #fff; box-shadow: 0 2px 6px rgba(37,99,235,.35); }

/* ── BODY SCROLL ── */
.body { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  background: var(--bg2);
  border-top: 1.5px solid var(--border);
  display: flex;
  padding-bottom: calc(8px + var(--safe-bot));
  flex-shrink: 0;
  box-shadow: 0 -1px 6px rgba(0,0,0,.06);
}
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 4px 6px; border: none; background: transparent; color: var(--text3); font-size: 13px; font-weight: 600; font-family: var(--font); cursor: pointer; transition: color .2s; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 24px; line-height: 1; }

/* ── PAGES ── */
.page { display: none; padding: 12px; min-height: 100%; }
.page.active { display: block; }

/* ── SECTION TITLE ── */
.sec-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin: 16px 0 8px; }
.sec-title:first-child { margin-top: 0; }

/* ── STAT CARDS ── */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
.stat-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 10px 10px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.stat-label { font-size: 13px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
.stat-val { font-size: 26px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.stat-val.green { color: var(--green); }
.stat-val.red { color: var(--red); }
.stat-val.blue { color: var(--accent); }

/* ── MAP ── */
.map-wrap { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.map-row-full { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
.map-row-mid { display: grid; gap: 3px; grid-template-columns: 14px 11fr 50fr 71fr 71fr 71fr 50fr 11fr 14px; align-items: stretch; }
.map-side-aisle { background: repeating-linear-gradient(180deg, rgba(217,119,6,.12) 0, rgba(217,119,6,.12) 3px, transparent 3px, transparent 7px); border-left: 1px dashed rgba(217,119,6,.4); border-right: 1px dashed rgba(217,119,6,.4); border-radius: 2px; }
.map-aisle { display: grid; grid-template-columns: 14px 1fr 14px; gap: 3px; align-items: center; margin: 3px 0; }
.map-aisle-lane { height: 20px; border-radius: 3px; background: repeating-linear-gradient(90deg, rgba(217,119,6,.1) 0, rgba(217,119,6,.1) 6px, transparent 6px, transparent 12px); border-top: 1.5px dashed rgba(217,119,6,.5); border-bottom: 1.5px dashed rgba(217,119,6,.5); display: flex; align-items: center; justify-content: center; }
.map-aisle-txt { font-size: 9px; color: #92400e; background: rgba(254,243,199,.9); padding: 1px 6px; border-radius: 6px; white-space: nowrap; font-weight: 600; border: 1px solid rgba(217,119,6,.25); }
.map-door { width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid var(--purple); background: rgba(124,58,237,.12); flex-shrink: 0; align-self: center; }
.map-touch-gap { height: 3px; }
.zc { border-radius: 7px; padding: 6px 2px 5px; cursor: pointer; text-align: center; border: 1.5px solid transparent; transition: transform .1s, border-color .1s; }
.zc:active { transform: scale(.95); }
.zc.sel { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(37,99,235,.2); }
.zn { font-size: 13px; font-weight: 700; font-family: var(--mono); }
.zf { font-size: 8px; opacity: .7; margin-top: 1px; font-weight: 500; }
.zp { font-size: 10px; font-weight: 700; margin-top: 1px; }
.zbar { height: 4px; border-radius: 2px; margin-top: 3px; background: rgba(0,0,0,.1); overflow: hidden; }
.zfill { height: 100%; border-radius: 2px; transition: width .3s; }
.zsku { font-size: 7px; margin-top: 2px; opacity: .8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--mono); font-weight: 600; }
.map-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.map-leg { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text3); font-weight: 500; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; }
.leg-aisle { width: 18px; height: 7px; background: repeating-linear-gradient(90deg, rgba(217,119,6,.5) 0, rgba(217,119,6,.5) 3px, transparent 3px, transparent 6px); border-radius: 2px; }
.leg-door { width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--purple); }

/* ── ZONE DETAIL SHEET ── */
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s; }
.sheet-overlay.show { opacity: 1; pointer-events: all; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-radius: 20px 20px 0 0; border-top: 1.5px solid var(--border); z-index: 101; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,0,.67,0); max-height: 75dvh; display: flex; flex-direction: column; padding-bottom: var(--safe-bot); box-shadow: 0 -4px 20px rgba(0,0,0,.12); }
.sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 4px; flex-shrink: 0; }
.sheet-head { padding: 4px 16px 14px; border-bottom: 1.5px solid var(--border); flex-shrink: 0; }
.sheet-zone-name { font-size: 30px; font-weight: 700; font-family: var(--mono); color: var(--text); }
.sheet-meta { font-size: 14px; color: var(--text3); margin-top: 3px; font-weight: 500; }
.sheet-body { overflow-y: auto; padding: 14px 16px; flex: 1; }
.progress-bar { height: 10px; background: var(--bg3); border-radius: 5px; overflow: hidden; margin: 10px 0; border: 1px solid var(--border); }
.progress-fill { height: 100%; border-radius: 5px; transition: width .4s; }
.sku-row { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
.sku-row-left { display: flex; flex-direction: column; gap: 5px; }
.sku-code { font-family: var(--mono); font-size: 17px; font-weight: 700; color: var(--accent); }
.sku-name { font-size: 15px; color: var(--text2); font-weight: 500; }
.sku-lot { font-size: 13px; color: var(--text3); font-family: var(--mono); }
.sku-qty { font-size: 26px; font-weight: 700; font-family: var(--mono); text-align: right; color: var(--text); }
.sku-qty-label { font-size: 13px; color: var(--text3); text-align: right; font-weight: 500; }
.empty-zone { text-align: center; padding: 28px; color: var(--text3); font-size: 15px; font-weight: 500; }

/* ── FORM ── */
.form-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
.form-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; color: var(--text); }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 14px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
.req { color: var(--red); }
.fg input, .fg select { width: 100%; background: var(--bg3); border: 1.5px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 17px; font-weight: 500; padding: 14px 14px; border-radius: var(--radius-sm); -webkit-appearance: none; appearance: none; transition: border-color .2s, box-shadow .2s; }
.fg input:focus, .fg select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); background: #fff; }
.fg input.err { border-color: var(--red); }
.fg .hint { font-size: 13px; color: var(--text3); margin-top: 5px; }
.fg .err-hint { font-size: 13px; color: var(--red); margin-top: 5px; display: none; font-weight: 500; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
.btn { width: 100%; padding: 17px; border-radius: var(--radius); font-size: 18px; font-weight: 700; font-family: var(--font); border: none; cursor: pointer; transition: all .15s; letter-spacing: .2px; }
.btn:active { transform: scale(.97); }
.btn-in { background: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(22,163,74,.3); }
.btn-out { background: var(--red); color: #fff; box-shadow: 0 2px 8px rgba(220,38,38,.3); }
.toast { position: fixed; bottom: calc(80px + var(--safe-bot)); left: 12px; right: 12px; z-index: 200; background: var(--bg2); border: 1.5px solid var(--border2); border-radius: var(--radius); padding: 14px 16px; font-size: 15px; font-weight: 500; transform: translateY(20px); opacity: 0; transition: all .3s; pointer-events: none; display: flex; align-items: flex-start; gap: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.12); }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok { border-color: #86efac; background: var(--green-bg); color: var(--green-t); }
.toast.err { border-color: #fca5a5; background: var(--red-bg); color: var(--red-t); }
.toast-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.toast-msg { flex: 1; line-height: 1.5; }

/* ── QUICK SEARCH ── */
.search-input-wrap { position: relative; margin-bottom: 10px; }
.search-input-wrap input { padding-left: 40px; }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 17px; pointer-events: none; }

/* ── STOCK TABLE (mobile cards) ── */
.stock-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.stock-card-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--bg3); }
.stock-card-body { padding: 10px 14px; display: flex; gap: 14px; flex-wrap: wrap; }
.stock-chip { display: flex; flex-direction: column; gap: 2px; }
.stock-chip-label { font-size: 12px; color: var(--text3); font-weight: 600; }
.stock-chip-val { font-size: 15px; font-weight: 600; color: var(--text); }
.tag { display: inline-block; font-family: var(--mono); font-size: 14px; font-weight: 700; padding: 3px 10px; border-radius: 6px; background: #eff6ff; color: var(--accent); border: 1.5px solid #bfdbfe; }
.badge { display: inline-block; font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 6px; }
.badge.in { background: #f0fdf4; color: var(--green); border: 1.5px solid #bbf7d0; }
.badge.out { background: #fef2f2; color: var(--red); border: 1.5px solid #fecaca; }
.filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-row select, .filter-row input { background: var(--bg2); border: 1.5px solid var(--border2); color: var(--text); font-family: var(--font); font-size: 15px; font-weight: 500; padding: 12px 14px; border-radius: var(--radius-sm); flex: 1; min-width: 100px; -webkit-appearance: none; }

/* ── HISTORY ── */
.hist-card { background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; padding: 12px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.hist-detail { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 6px; }
.hist-field { display: flex; flex-direction: column; gap: 2px; }
.hist-field-label { font-size: 12px; color: var(--text3); font-weight: 600; }
.hist-field-val { font-size: 14px; font-weight: 500; color: var(--text); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 36px 16px; color: var(--text3); }
.empty-icon { font-size: 42px; margin-bottom: 10px; }
.empty-text { font-size: 16px; font-weight: 500; }
/* ── TANK FARM ── */
.tank-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tank-card-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 8px;background:var(--bg3);border-bottom:1px solid var(--border)}
.tank-name{font-size:16px;font-weight:700;font-family:var(--mono);color:var(--text)}
.tank-product{font-size:13px;font-weight:600;color:var(--accent);font-family:var(--mono)}
.tank-body{padding:10px 14px 12px;display:flex;gap:10px;align-items:center}
.tank-visual{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.tank-svg{width:52px;height:72px}
.tank-pct-label{font-size:13px;font-weight:700;font-family:var(--mono)}
.tank-info{flex:1;display:flex;flex-direction:column;gap:6px}
.tank-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.tank-row-label{color:var(--text3);font-weight:600}
.tank-row-val{font-weight:600;font-family:var(--mono);color:var(--text)}
.tank-status{display:inline-block;font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px}
.tank-status.pass{background:#f0fdf4;color:#15803d;border:1.5px solid #86efac}
.tank-status.fail{background:#fef2f2;color:#dc2626;border:1.5px solid #fca5a5}
.tank-status.empty{background:#f8fafc;color:var(--text3);border:1.5px solid var(--border2)}
.tank-tx-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.tank-btn{padding:9px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;font-family:var(--font);border:none;cursor:pointer}
.tank-btn.in{background:var(--green);color:#fff}
.tank-btn.out{background:var(--red);color:#fff}
/* Tank TX Sheet */
.tank-tx-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;border-top:1.5px solid var(--border2);z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);max-height:80dvh;display:flex;flex-direction:column;padding-bottom:var(--safe-bot);box-shadow:0 -4px 20px rgba(0,0,0,.12)}
.tank-tx-sheet.show{transform:translateY(0)}
/* Settings */
.setting-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.setting-card-title{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--accent);margin-bottom:10px}
/* ── EXPORT / PRINT ── */
.preview-wrap{background:#fff;border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;margin-bottom:10px}
.preview-header{background:#1e3a5f;color:#fff;padding:12px 14px}
.preview-company{font-size:14px;font-weight:700;margin-bottom:2px}
.preview-title{font-size:12px;opacity:.85}
.preview-docref{font-size:10px;opacity:.7;margin-top:4px;font-family:var(--mono)}
.preview-table{width:100%;border-collapse:collapse;font-size:11px}
.preview-table th{background:#e8f0fe;color:#1e3a5f;font-weight:700;padding:7px 8px;text-align:left;border:1px solid #b8cef0;white-space:nowrap;font-size:10px}
.preview-table td{padding:7px 8px;border:1px solid #dde5f0;color:#1a1a2e;vertical-align:top}
.preview-table tr:nth-child(even) td{background:#f7f9ff}
.preview-table tr:hover td{background:#eef2ff}
.preview-summary{padding:10px 14px;background:#f7f9ff;border-top:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap}
.preview-sum-item{font-size:11px;color:var(--text2)}
.preview-sum-item b{color:var(--text);font-family:var(--mono)}
.no-data{text-align:center;padding:24px;color:var(--text3);font-size:13px}

@media print {
  .shell > .header, .bottom-nav, .form-card, .filter-row { display: none !important; }
  .page { display: none !important; }
  #page-export { display: block !important; padding: 0 !important; }
  .preview-wrap { border: none; border-radius: 0; }
  button { display: none !important; }
  .preview-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .preview-table th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .preview-table tr:nth-child(even) td { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-title">📦 WMS คลังสินค้า</div>
      <div class="header-sub" id="ts">--</div>
    </div>
    <div class="wh-toggle">
      <button class="wh-btn active" onclick="switchWH('78',this)">7-8</button>
      <button class="wh-btn" onclick="switchWH('910',this)">9-10</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body" id="bodyScroll">

    <!-- PAGE: MAP -->
    <div class="page active" id="page-map">
      <div class="stat-grid" id="statsEl"></div>
      <div class="sec-title">แผนผังคลัง</div>
      <div class="map-wrap">
        <div id="mapArea"></div>
        <div class="map-legend">
          <div class="map-leg"><div class="leg-dot" style="background:#22c55e"></div>ว่าง</div>
          <div class="map-leg"><div class="leg-dot" style="background:#f59e0b"></div>ปานกลาง</div>
          <div class="map-leg"><div class="leg-dot" style="background:#ef4444"></div>เต็ม</div>
          <div class="map-leg"><div class="leg-aisle"></div>ทางรถ</div>
          <div class="map-leg"><div class="leg-door"></div>ประตู</div>
        </div>
      </div>
    </div>

    <!-- PAGE: TX -->
    <div class="page" id="page-tx">

      <!-- Tab: รับเข้า / เบิกออก -->
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button id="tabIn" onclick="switchTxTab('in')" style="flex:1;padding:12px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:var(--font);border:2px solid var(--green);background:var(--green);color:#fff;cursor:pointer">+ รับเข้า</button>
        <button id="tabOut" onclick="switchTxTab('out')" style="flex:1;padding:12px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:var(--font);border:2px solid var(--border2);background:var(--bg2);color:var(--text3);cursor:pointer">− เบิกออก</button>
      </div>

      <!-- Form header matches WI -->
      <div class="form-card">
        <!-- Doc ref -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px">
          <div style="font-size:14px;font-weight:700;color:var(--text)" id="txFormTitle">📋 F-36 บันทึกรับเข้าคลัง</div>

<script>
// ── Zone definitions ──
const ZONES={
  P:{cap:180,f:'6×10×3'},Q:{cap:180,f:'6×10×3'},R:{cap:180,f:'6×10×3'},S:{cap:180,f:'6×10×3'},T:{cap:180,f:'6×10×3'},
  K:{cap:126,f:'6×7×3'},L:{cap:180,f:'6×10×3'},M:{cap:180,f:'6×10×3'},N:{cap:180,f:'6×10×3'},O:{cap:126,f:'6×7×3'},
  F:{cap:147,f:'7×7×3'},G:{cap:210,f:'7×10×3'},H:{cap:210,f:'7×10×3'},I:{cap:210,f:'7×10×3'},J:{cap:147,f:'7×7×3'},
  A:{cap:180,f:'6×10×3'},B:{cap:180,f:'6×10×3'},C:{cap:180,f:'6×10×3'},D:{cap:180,f:'6×10×3'},E:{cap:180,f:'6×10×3'},
  NC:{cap:999999,f:'NC Hold'},
};
const ZID=Object.keys(ZONES).filter(function(z){return z!=='NC';});
const STOCK={'78':{},'910':{}};
ZID.forEach(function(id){STOCK['78'][id]=[];STOCK['910'][id]=[];});
STOCK['78']['NC']=[];STOCK['910']['NC']=[];
const LOGS=[];
let curWH='78', selZone=null, toastTimer=null;

// ── Helpers ──
const SKU_RE=/^[A-Za-z0-9][A-Za-z0-9\-\.]{0,19}$/;
function zUsed(wh,id){return STOCK[wh][id].reduce((s,r)=>s+r.qty,0);}
function pct(wh,id){return Math.min(100,Math.round(zUsed(wh,id)/ZONES[id].cap*100));}
function col(p){
  if(p<40)return{bg:'#f0fdf4',bar:'#16a34a',txt:'#14532d',bd:'#86efac'};
  if(p<80)return{bg:'#fffbeb',bar:'#d97706',txt:'#78350f',bd:'#fde68a'};
  return{bg:'#fef2f2',bar:'#dc2626',txt:'#7f1d1d',bd:'#fca5a5'};
}
function todayStr(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;}
function nowStr(){const n=new Date();return`${todayStr()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
function whName(wh){return wh==='78'?'คลัง 7-8':'คลัง 9-10';}
function allSkus(){const s=new Set();['78','910'].forEach(wh=>ZID.forEach(z=>STOCK[wh][z].forEach(r=>s.add(r.sku))));return[...s];}

// ── Transaction — บันทึกลง Google Sheet ──
function doTx(){
  const type=curTxTab;
  const whid=document.getElementById('txWH').value;
  const zid=document.getElementById('txZone').value;
  const skuRaw=(document.getElementById('txSku').value||'').trim();
  const sku=skuRaw.toUpperCase();
  const lot=(document.getElementById('txLot').value||'').trim();
  const qty=parseFloat(document.getElementById('txQty').value)||0;
  const unit=document.getElementById('txUnit').value;
  const date=document.getElementById('txDate').value;
  const time=document.getElementById('txTime').value;
  const sender=(document.getElementById('txSender').value||'').trim();
  const user=(document.getElementById('txUser').value||'').trim();
  const note=(document.getElementById('txNote').value||'').trim();
  const whn=whName(whid);

  // validate
  const errs=[];
  if(!date) errs.push('กรุณาระบุวันที่');
  if(!time) errs.push('กรุณาระบุเวลา');
  if(!sender) errs.push(type==='in'?'กรุณาระบุผู้ส่ง/หน่วยงาน':'กรุณาระบุผู้รับ/หน่วยงาน');
  if(!sku) errs.push('กรุณาระบุรหัสสินค้า');
  else if(!SKU_RE.test(sku)) errs.push('รูปแบบรหัสสินค้าไม่ถูกต้อง');
  if(!qty||qty<=0) errs.push('กรุณาระบุจำนวน');
  if(!user) errs.push('กรุณาระบุผู้ควบคุม');
  if(errs.length){showToast(errs[0],false);return;}

  // check stock locally
  const rows=STOCK[whid][zid];
  const cap=ZONES[zid].cap;
  if(type==='in'){
    // ไม่จำกัด capacity — รับได้เกินที่ระบุใน layout
  } else {
    const skuTotal=rows.filter(r=>r.sku===sku).reduce((s,r)=>s+r.qty,0);
    if(!skuTotal){showToast(`ไม่พบ ${sku} ใน Zone ${zid}`,false);return;}
    if(qty>skuTotal){showToast(`${sku} มีเพียง ${skuTotal.toLocaleString()} ${unit}`,false);return;}
  }

  // disable button while saving
  const btn=document.getElementById('txSubmitBtn');
  btn.disabled=true;
  btn.textContent='⏳ กำลังบันทึก...';

  const txData={type,wh:whid,zone:zid,sku,lot,qty,unit,date,time,sender,user,note};

  // ── ส่งข้อมูลผ่าน Cloudflare Worker → Apps Script → Google Sheet ──
  const WORKER_URL='https://wms-proxy.esl-ptit.workers.dev';

  fetch(WORKER_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(txData)
  })
  .then(r=>r.json())
  .then(res=>{
    commitTx(type,whid,zid,sku,lot,qty,unit,txData,whn);
    btn.disabled=false;
    switchTxTab(type);
    showToast('✅ บันทึกลง Google Sheet เรียบร้อย',true);
  })
  .catch(err=>{
    console.error('Worker error:',err);
    commitTx(type,whid,zid,sku,lot,qty,unit,txData,whn);
    btn.disabled=false;
    switchTxTab(type);
    showToast('⚠️ บันทึกสำเร็จ (เช็ค internet)',false);
  });
}

// อัปเดต state หลัง save สำเร็จ
function commitTx(type,whid,zid,sku,lot,qty,unit,txData,whn){
  const rows=STOCK[whid][zid];
  if(type==='in'){
    const ex=rows.find(r=>r.sku===sku&&(r.lot||'')===(lot||''));
    if(ex)ex.qty+=qty;
    else rows.push({sku,name:'',qty,lot,unit});
    showToast(`✅ รับเข้า Zone ${zid} | ${sku} ${qty.toLocaleString()} ${unit} — บันทึกแล้ว`,true);
  } else {
    let rem=qty;
    for(const r of rows.filter(r=>r.sku===sku)){if(rem<=0)break;const tk=Math.min(r.qty,rem);r.qty-=tk;rem-=tk;}
    STOCK[whid][zid]=rows.filter(r=>r.qty>0);
    showToast(`✅ เบิกออก Zone ${zid} | ${sku} ${qty.toLocaleString()} ${unit} — บันทึกแล้ว`,true);
  }
  LOGS.push({...txData,wh:whn,formRef:type==='in'?'ESL-F-PE-36/00':'ESL-F-PE-37/00',recorded:nowStr()});
  fillSelects();renderMap();renderStats();renderStock();renderHist();
  // ── ล้างฟอร์มหลังบันทึก ──
  clearTxForm();
}

function clearTxForm(){
  document.getElementById('txSender').value='';
  // reset SKU select
  const sel=document.getElementById('txSkuSelect');
  if(sel) sel.value='';
  const skuInput=document.getElementById('txSku');
  if(skuInput){skuInput.value='';skuInput.style.display='none';}
  document.getElementById('txLot').value='';
  document.getElementById('txQty').value='1';
  document.getElementById('txUser').value='';
  document.getElementById('txNote').value='';
  // reset เวลาเป็นปัจจุบัน
  const n=new Date();

  const c=isNC?{bg:'#fef2f2',bar:'#dc2626',txt:'#7f1d1d',bd:'#fca5a5'}:col(p);

  document.getElementById('sheetZonePct').style.color=c.txt;
  document.getElementById('sheetZonePct').textContent=isNC?'NC':`${p}%`;
  document.getElementById('sheetZoneAvail').textContent=isNC?`มีสินค้า ${used} ชิ้น`:`ว่างอยู่ ${cap-used} ถุง`;
  document.getElementById('sheetProgress').style.cssText=`width:${isNC?Math.min(100,Math.round(used/10)):p}%;background:${c.bar}`;

function renderStock(){
  const q=(document.getElementById('stockSearch').value||'').toLowerCase();
  const zf=document.getElementById('stockZone').value;
  const el=document.getElementById('stockList');

  // รวบรวมข้อมูลทั้ง 2 คลัง
  const skuMap={}; // {sku: {unit, wh78, wh910, zones:[...]}}
  ['78','910'].forEach(wh=>{
    ZID.forEach(z=>{
      if(zf&&zf!==z)return;
      STOCK[wh][z].forEach(r=>{
        if(q&&!(r.sku.toLowerCase().includes(q)||(r.name||'').toLowerCase().includes(q)))return;
        if(!skuMap[r.sku]) skuMap[r.sku]={sku:r.sku,unit:r.unit||'ถุง',wh78:0,wh910:0,zones:[]};
        if(wh==='78') skuMap[r.sku].wh78+=r.qty;
        else skuMap[r.sku].wh910+=r.qty;
        skuMap[r.sku].zones.push({wh:whName(wh),zone:z,qty:r.qty,lot:r.lot,unit:r.unit||'ถุง'});
      });
    });
  });

  const skus=Object.values(skuMap);
  if(!skus.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">ไม่พบข้อมูล Stock</div></div>';return;}

  el.innerHTML=skus.map(s=>{

      <div class="stock-chip">
        <div class="stock-chip-label">${z.wh} Zone ${z.zone}${z.lot?' · '+z.lot:''}</div>

    return`<div class="stock-card">
      <div class="stock-card-head">
        <span class="tag">${s.sku}</span>
        <span style="font-size:15px;font-weight:800;font-family:var(--mono)">รวม ${total.toLocaleString()} ${s.unit}</span>

        ${s.wh910>0?`<div class="stock-chip" style="background:#f0fdf4"><div class="stock-chip-label">คลัง 9-10</div><div class="stock-chip-val" style="color:#16a34a">${s.wh910.toLocaleString()} ${s.unit}</div></div>`:''}

// ── TANK FARM ──────────────────────────────────────────────────────────────
// Default 12 tanks, all settings editable
const TANK_IDS=['SL-01','SL-02','SL-03','SL-04','SL-05','SL-06','SL-07','SL-08','SL-09','SL-10','SL-11','SL-12'];

// Tank config: { product, maxKg, unit }  — editable by user
const TANK_CFG={};
TANK_IDS.forEach(id=>{TANK_CFG[id]={product:'',maxKg:300000};});

// Tank state: { curKg, lot, status('PASS'/'FAIL'/'') }
const TANK_STATE={};
TANK_IDS.forEach(id=>{TANK_STATE[id]={curKg:0,lot:'',status:''};});

const TANK_LOGS=[];

function tankPct(id){
  const cfg=TANK_CFG[id];
  if(!cfg.maxKg)return 0;
  return Math.min(100,Math.round(TANK_STATE[id].curKg/cfg.maxKg*100));
}
function tankCol(p){
  if(p===0)return{fill:'#e2e8f0',water:'#94a3b8',txt:'#64748b'};
  if(p<40)return{fill:'#dcfce7',water:'#22c55e',txt:'#15803d'};
  if(p<80)return{fill:'#fef9c3',water:'#eab308',txt:'#854d0e'};
  return{fill:'#fee2e2',water:'#ef4444',txt:'#991b1b'};
}

function mkTankSVG(p,water){
  // Draw tank as rounded rectangle with water fill
  const h=60,w=44,fill=Math.round((p/100)*h);
  const waterY=8+(h-fill);
  return`<svg width="${w}" height="${h+16}" viewBox="0 0 ${w} ${h+16}" xmlns="http://www.w3.org/2000/svg">
    <!-- tank body outline -->
    <rect x="2" y="4" width="${w-4}" height="${h}" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- water fill -->
    ${p>0?`<clipPath id="tc${p}"><rect x="2" y="4" width="${w-4}" height="${h}" rx="6"/></clipPath>
    <rect x="2" y="${waterY}" width="${w-4}" height="${fill}" fill="${water}" opacity=".75" clip-path="url(#tc${p})"/>
    <!-- water surface wave -->
    <path d="M2 ${waterY} Q${w/4} ${waterY-3} ${w/2} ${waterY} Q${w*3/4} ${waterY+3} ${w-2} ${waterY}" fill="none" stroke="${water}" stroke-width="1.5" clip-path="url(#tc${p})"/>`:''}
    <!-- tank outline on top -->
    <rect x="2" y="4" width="${w-4}" height="${h}" rx="6" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- pipe top -->
    <rect x="${w/2-4}" y="0" width="8" height="6" rx="2" fill="#94a3b8"/>
    <!-- pipe bottom -->
    <rect x="${w/2-4}" y="${h+4}" width="8" height="8" rx="2" fill="#94a3b8"/>
    <rect x="4" y="${h+8}" width="${w-8}" height="4" rx="2" fill="#94a3b8"/>
  </svg>`;
}

  // Summary bar
  const total=TANK_IDS.length;

  const pass=TANK_IDS.filter(id=>TANK_STATE[id].status==='PASS').length;

function openTankTx(id,type){
  const cfg=TANK_CFG[id];
  const st=TANK_STATE[id];
  const p=tankPct(id);
  const c=tankCol(p);
  document.getElementById('tankTxId').value=id;
  document.getElementById('tankTxType').value=type;
  document.getElementById('tankTxName').textContent=id;
  document.getElementById('tankTxMeta').textContent=`${cfg.product||'ยังไม่ตั้งค่า'} · ความจุ ${cfg.maxKg.toLocaleString()} KG`;
  document.getElementById('tankTxBadge').innerHTML=type==='in'?
    `<span class="badge in">รับเข้า</span>`:`<span class="badge out">เบิกออก</span>`;
  document.getElementById('tankTxProgress').style.cssText=`width:${p}%;background:${c.water}`;
  document.getElementById('tankTxQty').value='';
  document.getElementById('tankTxLot').value=st.lot||'';
  document.getElementById('tankTxDate').value=todayStr();
  document.getElementById('tankTxUser').value='';
  document.getElementById('tankTxNote').value='';
  // show pass/fail only on รับเข้า
  document.getElementById('tankPassFailGroup').style.display=type==='in'?'flex':'none';
  document.getElementById('tankTxStatus').value='PASS';
  document.getElementById('tankOverlay').classList.add('show');
  document.getElementById('tankTxSheet').classList.add('show');
  document.getElementById('bodyScroll').style.overflow='hidden';
}
function closeTankTx(){
  document.getElementById('tankOverlay').classList.remove('show');
  document.getElementById('tankTxSheet').classList.remove('show');
  document.getElementById('bodyScroll').style.overflow='';
}
function confirmTankTx(){
  const id=document.getElementById('tankTxId').value;
  const type=document.getElementById('tankTxType').value;
  const qty=parseFloat(document.getElementById('tankTxQty').value)||0;
  const lot=document.getElementById('tankTxLot').value.trim();
  const date=document.getElementById('tankTxDate').value;
  const user=document.getElementById('tankTxUser').value.trim();
  const note=document.getElementById('tankTxNote').value.trim();
  const status=document.getElementById('tankTxStatus').value;
  const method=document.getElementById('tankTxMethod').value;
  const cfg=TANK_CFG[id];
  const st=TANK_STATE[id];
  if(!qty||qty<=0){showToast('กรุณาระบุจำนวน KG',false);return;}
  if(!date){showToast('กรุณาระบุวันที่',false);return;}
  if(!user){showToast('กรุณาระบุผู้ทำรายการ',false);return;}
  if(type==='in'){
    const avail=cfg.maxKg-st.curKg;
    if(qty>avail){showToast(`รับไม่ได้ — ${id} เหลือที่ว่าง ${avail.toLocaleString()} KG`,false);return;}
    st.curKg+=qty;
    if(lot)st.lot=lot;
    st.status=status;
    showToast(`รับเข้า ${id} | ${qty.toLocaleString()} KG ✓`,true);
  } else {
    if(qty>st.curKg){showToast(`เบิกไม่ได้ — ${id} มีเพียง ${st.curKg.toLocaleString()} KG`,false);return;}
    st.curKg-=qty;
    if(st.curKg===0){st.lot='';st.status='';}
    showToast(`เบิกออก ${id} | ${qty.toLocaleString()} KG ✓`,true);
  }
  TANK_LOGS.push({type,tank:id,product:cfg.product,qty,lot,date,user,note,method,status:type==='in'?status:'',recorded:nowStr()});
  closeTankTx();
  renderTankPage();
}

// ── EXPORT ──────────────────────────────────────────────────────────────────
// แปลง Sheet data เป็น format ที่ใช้ใน export
function sheetRowToLog(r){
  const type=String(r['Activity_Type']||'').includes('รับ')?'in':'out';
  const ts=r['Timestamp'];
  let date='',time='';
  if(ts){
    // แปลงปี พ.ศ. → ค.ศ. โดยลบ 543
    const fixed=String(ts).replace(/^(\d{4})/,function(y){return parseInt(y)-543;});
    const d=new Date(fixed);
    if(!isNaN(d)){
      date=d.toISOString().split('T')[0];
      time=String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0');
    }
  }
  return{
    type, date, time,
    sender: r['Source']||'',
    sku:    r['Product_Code']||'',
    lot:    r['Lot_Number']||'',
    qty:    parseFloat(r['Quantity'])||0,
    unit:   r['Unit']||'ถุง',
    zone:   r['Zone']||'',
    wh:     r['From_To']||'',
    user:   r['Recorder']||'',
    note:   r['Remark']||'',
    formRef: type==='in'?'ESL-F-PE-36/00':'ESL-F-PE-37/00'
  };
}

function fetchLogsAndRun(callback){
  const el=document.getElementById('exportPreviewArea');
  if(el) el.innerHTML='<div class="no-data">⏳ กำลังโหลดข้อมูล...</div>';
  fetch('https://wms-proxy.esl-ptit.workers.dev?action=getLogs')
    .then(function(r){return r.json();})
    .then(function(res){
      if(!res.success||!res.data){
        if(el) el.innerHTML='<div class="no-data">ไม่สามารถดึงข้อมูลได้</div>';
        return;
      }
      const logs=res.data.map(sheetRowToLog);
      callback(logs);
    })
    .catch(function(){
      if(el) el.innerHTML='<div class="no-data">เกิดข้อผิดพลาดในการดึงข้อมูล</div>';
    });
}

function filterLogs(logs){
  const dateFrom=document.getElementById('expDateFrom').value;
  const dateTo=document.getElementById('expDateTo').value;
  const wf=document.getElementById('expWH').value;
  const tf=document.getElementById('expType').value;
  return logs.filter(function(l){
    if(tf&&l.type!==tf)return false;
    if(wf&&l.wh!==wf)return false;
    if(dateFrom&&l.date<dateFrom)return false;
    if(dateTo&&l.date>dateTo)return false;
    return true;
  });
}

function exportPreview(){
  fetchLogsAndRun(function(logs){
    const rows=filterLogs(logs);
    const tf=document.getElementById('expType').value;
    const el=document.getElementById('exportPreviewArea');
    if(!rows.length){
      el.innerHTML='<div class="no-data">ไม่พบข้อมูลในช่วงที่เลือก</div>';return;
    }
    const groups=tf?[{type:tf,data:rows}]:[
      {type:'in',data:rows.filter(function(r){return r.type==='in';})},
      {type:'out',data:rows.filter(function(r){return r.type==='out';})}
    ].filter(function(g){return g.data.length>0;});

    el.innerHTML=groups.map(function(g){
      const isIn=g.type==='in';
      const title=isIn
        ?'บันทึกการควบคุมวัตถุดิบ, Semi-Product, Product เข้าจัดเก็บคลังสินค้า (Stock Inbound)'
        :'บันทึกการควบคุมวัตถุดิบ, Semi-Product, Product ออกจากคลังสินค้า (Stock Outbound)';
      const docRef=isIn?'ESL-F-PE-36/00':'ESL-F-PE-37/00';
      const col2=isIn?'ผู้ส่ง/หน่วยงาน':'ผู้รับ/หน่วยงาน';
      const totalQty=g.data.reduce(function(s,r){return s+(r.qty||0);},0);
      const uniqueSku=[...new Set(g.data.map(function(r){return r.sku;}))];
      const tableRows=g.data.map(function(r){return '<tr><td>'+r.date+'</td><td>'+r.sender+'</td><td style="font-family:monospace;font-weight:600">'+r.sku+'</td><td>'+r.lot+'</td><td style="text-align:right;font-family:monospace">'+(r.qty||0).toLocaleString()+'</td><td>'+r.unit+'</td><td style="font-weight:600">'+r.zone+'</td><td>'+r.time+'</td><td>'+r.user+'</td><td>'+r.note+'</td></tr>';}).join('');
      return '<div class="preview-wrap"><div class="preview-header"><div class="preview-company">บริษัท อีสเทิร์นซิลิเกต จำกัด</div><div class="preview-title">'+title+'</div><div class="preview-docref">'+docRef+' · พิมพ์เมื่อ '+nowStr()+'</div></div><div style="overflow-x:auto"><table class="preview-table"><thead><tr><th>DATE</th><th>'+col2+'</th><th>รหัส</th><th>รายการ/Lot</th><th>จำนวน</th><th>หน่วย</th><th>Zone</th><th>เวลา</th><th>ผู้ควบคุม</th><th>หมายเหตุ</th></tr></thead><tbody>'+tableRows+'</tbody></table></div><div class="preview-summary"><div class="preview-sum-item">รายการทั้งหมด: <b>'+g.data.length+'</b> รายการ</div><div class="preview-sum-item">รวมจำนวน: <b>'+totalQty.toLocaleString()+'</b></div><div class="preview-sum-item">SKU: <b>'+uniqueSku.join(', ')+'</b></div></div><div style="padding:10px 14px;text-align:right"><button onclick="window.print()" style="padding:10px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);border:none;background:#1e3a5f;color:#fff;cursor:pointer">🖨 พิมพ์</button></div></div>';
    }).join('');
  });
}

function exportCSV(){
  fetchLogsAndRun(function(logs){
    const rows=filterLogs(logs);
    if(!rows.length){showToast('ไม่พบข้อมูลในช่วงที่เลือก',false);return;}
    const tf=document.getElementById('expType').value;
    const isIn=tf==='in';
    const col2=isIn?'ผู้ส่ง/หน่วยงาน':'ผู้รับ/หน่วยงาน';
    const headers=['DATE',col2,'รหัส','รายการ/Lot','จำนวน','หน่วย','Zone','เวลา','ผู้ควบคุม','หมายเหตุ','คลัง','ประเภท','เลขฟอร์ม'];
    const csvRows=[headers,...rows.map(function(r){return[r.date||'',r.sender||'',r.sku||'',r.lot||'',r.qty||0,r.unit||'ถุง',r.zone||'',r.time||'',r.user||'',r.note||'',r.wh||'',r.type==='in'?'รับเข้า':'เบิกออก',r.formRef||''];})];
    const bom='\uFEFF';
    const csv=bom+csvRows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const dateFrom=document.getElementById('expDateFrom').value||'all';
    const dateTo=document.getElementById('expDateTo').value||'all';
    a.download='WMS_Export_'+(tf||'all')+'_'+dateFrom+'_'+dateTo+'.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('ดาวน์โหลด CSV เรียบร้อยแล้ว',true);
  });
}
